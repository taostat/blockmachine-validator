name: Build and Push

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Determine environment from tag
        id: env
        run: |
          REF="${GITHUB_REF#refs/tags/}"
          if [[ "$REF" == *-dev ]]; then
            echo "overlays=testnet" >> "$GITHUB_OUTPUT"
          else
            echo "overlays=testnet mainnet" >> "$GITHUB_OUTPUT"
          fi
          echo "tag=$REF" >> "$GITHUB_OUTPUT"

      - name: Log in to Quay.io
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Build and Push blockmachine-validator
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            quay.io/taostats/blockmachine-validator:${{ steps.env.outputs.tag }}
            quay.io/taostats/blockmachine-validator:latest
          cache-from: type=registry,ref=quay.io/taostats/blockmachine-validator:buildcache
          cache-to: type=registry,ref=quay.io/taostats/blockmachine-validator:buildcache,mode=max

      - name: Trigger deployment
        uses: peter-evans/repository-dispatch@ff45666b9427631e3450c54a1bcbee4d9ff4d7c0  # v3.0.0
        with:
          token: ${{ secrets.GH_PAT }}
          repository: taostat/ci-cd-repo
          event-type: update-image
          client-payload: >-
            {
              "shared-secret": "${{ secrets.GH_PAT }}",
              "project-name": "blockmachine",
              "image-name": "blockmachine-validator",
              "version": "${{ steps.env.outputs.tag }}",
              "paths": "${{ steps.env.outputs.overlays }}"
            }
